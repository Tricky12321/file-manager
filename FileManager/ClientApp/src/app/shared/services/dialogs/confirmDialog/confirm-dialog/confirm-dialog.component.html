@if (dialogService.request(); as req) {
  <div class="modal-backdrop fade show"></div>
  <div class="modal fade show d-block" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ req.header }}</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="dialogService.respond(false)"></button>
        </div>
        <div class="modal-body">
          <span class="newLines" [innerHTML]="req.message"></span>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="dialogService.respond(false)">{{ req.noButton }}</button>
          <button type="button" class="btn btn-primary" (click)="dialogService.respond(true)">{{ req.yesButton }}</button>
        </div>
      </div>
    </div>
  </div>
}

@if (dialogService.selectionRequest(); as req) {
  <div class="modal-backdrop fade show"></div>
  <div class="modal fade show d-block" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ req.header }}</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="dialogService.cancelSelection()"></button>
        </div>
        <div class="modal-body">
          <p>{{ req.message }}</p>
          <div class="list-group" style="max-height: 50vh; overflow-y: auto;">
            @for (item of req.items; track item.path) {
              <label class="list-group-item d-flex align-items-center">
                <input class="form-check-input me-2 flex-shrink-0" type="checkbox" [(ngModel)]="item.selected"/>
                <span class="text-break">{{ item.path }}</span>
              </label>
            } @empty {
              <div class="list-group-item">No files to delete.</div>
            }
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="dialogService.cancelSelection()">{{ req.cancelButton }}</button>
          <button type="button" class="btn btn-danger" [disabled]="selectedCount === 0" (click)="dialogService.confirmSelection()">
            {{ req.confirmButton }} ({{ selectedCount }})
          </button>
        </div>
      </div>
    </div>
  </div>
}
